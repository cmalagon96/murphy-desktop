name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the release once, up front — matrix jobs racing to create it
  # simultaneously is exactly the 422 already_exists failure mode.
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" \
            --title "Murphy Desktop ${GITHUB_REF_NAME#v}" \
            --notes "Installers for Windows, macOS, and Linux. Unsigned builds: on Windows, SmartScreen shows 'Windows protected your PC' (More info -> Run anyway); on macOS, right-click -> Open on first launch."

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac
            assets: "dist/*.dmg dist/*.zip"
          - os: windows-latest
            args: --win
            assets: "dist/*.exe"
          - os: ubuntu-latest
            args: --linux
            assets: "dist/*.AppImage"
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned builds, skip codesign discovery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Retry: hdiutil on macOS runners intermittently fails with I/O errors
      - run: |
          for i in 1 2 3; do
            npx electron-builder ${{ matrix.args }} --publish never && exit 0
            echo "build attempt $i failed, retrying..."
          done
          exit 1
        shell: bash
      - run: gh release upload "$GITHUB_REF_NAME" ${{ matrix.assets }} --clobber
        shell: bash
