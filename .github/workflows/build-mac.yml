name: Build macOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned build, skip codesign discovery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --mac
      - uses: actions/upload-artifact@v4
        with:
          name: murphy-desktop-mac
          path: |
            dist/*.dmg
            dist/*.zip
